<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folio - Portfolio Maker</title>
    <style>
        /* Avvalgi barcha stillaringiz shu yerda qoladi */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: linear-gradient(to top, #818181 20%, #c5c5c5 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .background-elements {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .sphere {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 50%,  #ff5d78, #fa2246);
            box-shadow: inset -10px -10px 40px rgba(0,0,0,0.5);
            filter: blur(2px);
        }

        .s1 { width: 300px; height: 300px; top: -50px; left: -50px; }
        .s2 { width: 180px; height: 180px; top: 15%; right: 10%; opacity: 0.8; }
        .s3 { width: 350px; height: 350px; bottom: -80px; left: 15%; }
        .s4 { width: 220px; height: 220px; bottom: 10%; right: 15%; }

        .spiral {
            position: absolute;
            border: 6px solid #e0e0e0;
            border-radius: 50%;
            z-index: 2;
            transform: rotate(-15deg);
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }
        .sp1 { width: 100px; height: 60px; left: 2%; top: 50%; }
        .sp2 { width: 80px; height: 120px; right: 5%; top: 30%; }

        .container {
            z-index: 10;
            width: 90%;
            max-width: 1100px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.186);
            border-radius: 45px;
            padding: 50px;
            color: white;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 80px;
        }

        .logo {
            font-weight: 900;
            font-size: 20px;
            border: 2px solid white;
            padding: 5px 15px;
            border-radius: 25px;
            letter-spacing: 2px;
        }

        .action-btn {
            width: 70px;
            height: 28px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            text-align: center;
            color:#f1efef;
            line-height: 28px;
            font-size: 12px;
        }

        .hero-section h1 {
            font-size: 110px;
            font-weight: 900;
            letter-spacing: 12px;
            background: linear-gradient(180deg, #ffffff 40%, #888888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));
        }

        .badge {
            font-size: 18px;
            font-weight: 400;
            color: #f0f0f0;
            margin-bottom: 25px;
            letter-spacing: 1.5px;
        }

        .badge span {
            font-size: 22px;
            margin-right: 8px;
        }

        .desc {
            font-size: 16px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.6);
            max-width: 550px;
            margin: 0 auto;
            font-weight: 300;
            margin-bottom: 40px;
        }
/* TO'G'RILANGAN QISM: Portfolio tanlash gridi */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 30px;
            perspective: 1000px; /* 3D effekt barqarorligi uchun */
        }

        .portfolio-item {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            height: 220px;
            display: flex;
            align-items: flex-end; /* Matnni pastga tushiradi */
            justify-content: center;
            text-decoration: none;
            color: white;
            padding-bottom: 15px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
            position: relative;
            
            /* Rasm sig'ishi uchun sozlamalar */
            background-size: cover; /* Yoki 'contain' agar rasm kesilmasligi shart bo'lsa */
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Ustiga borganda ortiqcha o'ynashni kamaytirish va chiroyli qilish */
        .portfolio-item:hover {
            transform: translateY(-8px) scale(1.02);
            background-color: rgba(255, 255, 255, 0.15);
            border-color: #ff5d78;
            box-shadow: 0 10px 25px rgba(255, 93, 120, 0.3);
        }

        .portfolio-item span {
            z-index: 2;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 18px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            font-size: 12px;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Bosilganda (active) holati */
        .portfolio-item:active {
            transform: translateY(-2px) scale(0.98);
        }
    </style>
</head>
<body>

    <div class="background-elements">
        <div class="sphere s1"></div>
        <div class="sphere s2"></div>
        <div class="sphere s3"></div>
        <div class="sphere s4"></div>
        <div class="spiral sp1"></div>
        <div class="spiral sp2"></div>
    </div>

    <div class="container">
        <main class="glass-card">
            <nav class="navbar">
                <div class="logo">Portofolio</div>
                <div class="action-btn">Free</div>
            </nav>

            <div class="hero-section" style="margin-top: -120px;margin-bottom: 100px;">
                <h1>Folio</h1>
                <p class="badge"><span>•</span> PortfolioMaker</p>
                <p class="desc" style="margin-bottom: -80px;">
                   Folio bilan portofoliolaringizni qulay va oson yarating
                </p>
            </div>

            <div class="portfolio-grid">
                <a href="minimal.html" class="portfolio-item" style="background-image: url('port1.png');">
                    <span>Minimal</span>
                </a>
                <a href="portofolio2.html" class="portfolio-item" style="background-image: url('port2.png');">
                    <span>Dark UI</span>
                </a>
                <a href="portofolio6.html" class="portfolio-item" style="background-image: url('port3.png');">
                    <span>Creative</span>
                </a>
                <a href="portofolio3.html" class="portfolio-item" style="background-image: url('port4.png');">
                    <span>Pink style</span>
                </a>
            </div>
        </main>
    </div>

</body>
</html>
